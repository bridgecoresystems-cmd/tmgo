# Деплой на VPS при push в master.
#
# GitHub Secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_HOST           — IP сервера (187.124.172.243)
#   DEPLOY_USER           — пользователь SSH (root)
#   DEPLOY_SSH_KEY        — приватный ключ (id_ed25519_tmgo_actions)
#   NUXT_PUBLIC_API_BASE  — https://bcs301.site
#   NUXT_PUBLIC_WS_URL    — wss://bcs301.site
#
# Схема: сборка на Actions runner (7 GB RAM) → rsync артефактов на VPS → migrate + restart

name: Deploy VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build backend
        run: bun run build:backend

      - name: Build frontend (SSR)
        env:
          NUXT_PUBLIC_API_BASE: ${{ secrets.NUXT_PUBLIC_API_BASE }}
          NUXT_PUBLIC_WS_URL: ${{ secrets.NUXT_PUBLIC_WS_URL }}
        run: bun run build:frontend

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Sync artifacts to VPS
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            packages/backend/dist/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/tmgo/packages/backend/dist/

          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            packages/frontend/.output/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/tmgo/packages/frontend/.output/

      - name: Migrate + restart
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/tmgo
            git pull --ff-only origin master
            cd packages/backend && bun run db:migrate
            systemctl restart tmgo-backend
            systemctl restart tmgo-frontend
            echo "Deploy done ✓"
