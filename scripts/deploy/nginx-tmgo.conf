# TMGO: Nuxt :3000, Elysia :8000 на одном домене.
# map: пути API → :8000, но Accept: text/html → :3000 (SPA), кроме /api/auth и /swagger.
#
# Один server_name с www и apex — проще для SSL/Certbot и не ломает закладки.
# Если нужен только apex — настройте редирект в Cloudflare, не обязательно в nginx.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

map $uri $tmgo_upstream_default {
    default "3000";
    ~^/(api/auth|cities|admin|cabinet|legal|swagger) "8000";
}

map $http_accept $tmgo_upstream_port {
    default $tmgo_upstream_default;
    "~*text/html" "3000";
}

map $request_uri $tmgo_upstream_final {
    default $tmgo_upstream_port;
    ~^/api/auth "8000";
    ~^/swagger "8000";
}

upstream tmgo_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream tmgo_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name bcs301.site www.bcs301.site;

    ssl_certificate /etc/letsencrypt/live/bcs301.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bcs301.site/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50m;

    location /swagger {
        proxy_pass http://tmgo_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ^~ важнее regex с .js — всегда отдаём чанки Nuxt, не общий location /
    location ^~ /_nuxt/ {
        proxy_pass http://tmgo_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ^~ важнее regex с .png — иначе аватары уезжают в Nuxt и браузер видит пустой HTML.
    location ^~ /api/auth/avatars/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Nitro-прокси аватаров (если используется /api/avatar/...) — до общего catch-all.
    location ^~ /api/avatar/ {
        proxy_pass http://tmgo_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Статика по расширению; не трогать /api/*
    location ~* ^/(?!api/).*\.(js|mjs|css|png|jpg|jpeg|gif|ico|svg|woff2?|webp|map)$ {
        proxy_pass http://tmgo_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:$tmgo_upstream_final;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400s;
    }
}

# HTTP → HTTPS, тот же host (www остаётся www)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name bcs301.site www.bcs301.site;
    return 301 https://$host$request_uri;
}
