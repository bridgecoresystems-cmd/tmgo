# Скопировать в /etc/nginx/sites-available/tmgo и: nginx -t && systemctl reload nginx
# Прокси: фронт (Nuxt :3000), API (Elysia :8000) по префиксам маршрутов.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream tmgo_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream tmgo_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name bcs301.site www.bcs301.site;

    client_max_body_size 50m;

    location ~ ^/(api/auth|cities|admin|cabinet|legal|swagger) {
        proxy_pass http://tmgo_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400s;
    }

    location / {
        proxy_pass http://tmgo_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
