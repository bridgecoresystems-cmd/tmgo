services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tmgo_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tmgo_pass}
      POSTGRES_DB: ${POSTGRES_DB:-tmgo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tmgo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tmgo_user}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - tmgo-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-tmgo_user}:${POSTGRES_PASSWORD:-tmgo_pass}@postgres:5432/${POSTGRES_DB:-tmgo}
      REDIS_PRIVATE_URL: redis://redis:6379
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      CHAT_ATTACHMENT_SECRET: ${CHAT_ATTACHMENT_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      NODE_ENV: production
    ports:
      - "${BACKEND_PORT:-8020}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/packages/backend/public/uploads
    networks:
      - tmgo-network

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
      args:
        NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE}
        NUXT_PUBLIC_WS_URL: ${NUXT_PUBLIC_WS_URL}
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE}
      NUXT_PUBLIC_WS_URL: ${NUXT_PUBLIC_WS_URL}
      PORT: 3000
      NODE_ENV: production
    ports:
      - "${FRONTEND_PORT:-3020}:3000"
    depends_on:
      - backend
    networks:
      - tmgo-network

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  tmgo-network:
    driver: bridge
