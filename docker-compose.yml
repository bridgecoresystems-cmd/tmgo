services:
  redis:
    image: redis:7-alpine
    container_name: tmgo-redis
    restart: always
    networks:
      - tmgo-net

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    container_name: tmgo-backend
    restart: always
    env_file:
      - packages/backend/.env
    ports:
      - "8020:8000"
    volumes:
      - ./storage:/app/storage
    depends_on:
      - redis
    networks:
      - tmgo-net

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    container_name: tmgo-frontend
    restart: always
    ports:
      - "3020:3000"
    networks:
      - tmgo-net

networks:
  tmgo-net:
    external: true
